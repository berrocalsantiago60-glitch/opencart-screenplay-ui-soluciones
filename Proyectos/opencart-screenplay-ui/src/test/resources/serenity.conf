webdriver {
  driver = chrome
  wait.for.timeout = 15000
  timeouts.implicitlywait = 10000
  autodownload = true
  capabilities {
    "goog:chromeOptions" {
      args = [
        "--start-maximized",
        "--disable-save-password-bubble",
        "--disable-password-manager-reauthentication",
        "--disable-features=PasswordLeakDetection,PasswordCheck,PasswordManagerOnboarding,AutofillServerCommunication",
        "--disable-component-update",
        "--no-first-run",
        "--no-default-browser-check",
        "--disable-default-apps",
        "--disable-popup-blocking",
        "--disable-infobars",
        "--disable-notifications",
        "--remote-allow-origins=*",
        "--incognito"
      ]
      excludeSwitches = ["enable-automation"]
      prefs {
        credentials_enable_service = false
        "profile.password_manager_enabled" = false
        "profile.password_manager_leak_detection" = false
        "autofill.profile_enabled" = false
        "autofill.credit_card_enabled" = false
      }
    }
  }
}

headless.mode = false

serenity {
  project.name = "OpenCart Screenplay UI"
  take.screenshots = AFTER_EACH_STEP
  tag.failures = true
  restart.browser.for.each = SCENARIO
  timeout = 15000
  verify.implicit.waits = true
}

environments {
  default {
    webdriver.base.url = "https://naveenautomationlabs.com/opencart"
  }
}